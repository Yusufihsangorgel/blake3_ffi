name: blake3_ffi
description: >-
  BLAKE3 hashing for Dart over native FFI, up to 14x faster than SHA-256. One-
  shot, streaming, keyed (MAC), and key derivation. C auto-compiled at build, no
  binaries to ship.
version: 0.1.2
repository: https://github.com/Yusufihsangorgel/blake3_ffi
issue_tracker: https://github.com/Yusufihsangorgel/blake3_ffi/issues

topics:
  - blake3
  - hashing
  - cryptography
  - ffi
  - performance

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  crypto: ^3.0.0
  lints: ^6.0.0
  test: ^1.25.0
