name: blake3_ffi
description: >-
  Fast BLAKE3 cryptographic hashing for Dart via native FFI. One-shot,
  streaming, keyed, and key derivation.
version: 0.1.0
repository: https://github.com/Yusufihsangorgel/blake3_ffi

topics:
  - blake3
  - hashing
  - cryptography
  - ffi
  - performance

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  crypto: ^3.0.0
  lints: ^6.0.0
  test: ^1.25.0
