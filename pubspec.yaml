name: blake3_ffi
description: >-
  BLAKE3 hashing for Dart over native FFI, up to 14x faster than SHA-256. One-
  shot, streaming, keyed (MAC), and key derivation. C auto-compiled at build, no
  binaries to ship.
version: 0.4.0
repository: https://github.com/Yusufihsangorgel/blake3_ffi
issue_tracker: https://github.com/Yusufihsangorgel/blake3_ffi/issues

topics:
  - blake3
  - hashing
  - cryptography
  - ffi
  - performance

screenshots:
  - description: >-
      Hashing throughput over 16 MB, measured on Apple Silicon: 2519 MB/s
      against 196 for dart:core sha256 and 181 for pure-Dart BLAKE3.
    path: doc/benchmark.png

environment:
  sdk: ^3.10.0

# Overrides pub.dev's static-analysis-derived platform tags. Without this,
# pana infers android/ios support from the transitive import graph alone,
# which cannot see that hook/build.dart has never been exercised on either
# platform (no CI job, no test run) and that Flutter's build-hooks/
# native-assets support isn't stable yet. Only list what's actually
# verified: CI (.github/workflows/ci.yaml) covers linux/macos/windows, and
# hook/build.dart's own CBuilder invocation has only ever run there.
# Add android/ios back here once Flutter build-hooks are stable AND this
# package has a real, tested build for them.
platforms:
  linux:
  macos:
  windows:

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: '>=2.0.2 <3.0.0'
  native_toolchain_c: '>=0.19.2 <0.20.0'

dev_dependencies:
  crypto: ^3.0.0
  lints: ^6.0.0
  test: ^1.25.0
