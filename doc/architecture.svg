<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="360" viewBox="0 0 1160 360" font-family="Menlo, monospace">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#38BDF8"/></marker></defs>
  <rect width="1160" height="360" fill="#0B1220"/>
  <text x="44" y="50" font-size="22" font-weight="bold" fill="#E2E8F0">How a hash is computed</text>
  <rect x="44" y="90" width="270" height="150" rx="10" fill="#0E1A2E" stroke="#1E3A5F"/>
  <text x="62" y="118" font-size="13" fill="#64748B">DART</text>
  <text x="62" y="150" font-size="15" fill="#E2E8F0">blake3(bytes)</text>
  <text x="62" y="176" font-size="13" fill="#94A3B8">Blake3Hasher for streaming,</text>
  <text x="62" y="196" font-size="13" fill="#94A3B8">keyed and derive-key modes</text>
  <text x="62" y="222" font-size="12.5" fill="#64748B">bytes passed by pointer, no copy</text>

  <rect x="380" y="90" width="150" height="150" rx="10" fill="#0E1A2E" stroke="#1E3A5F" stroke-dasharray="5 4"/>
  <text x="398" y="118" font-size="13" fill="#64748B">dart:ffi</text>
  <text x="455" y="172" font-size="14" fill="#E2E8F0" text-anchor="middle" transform="rotate(-90 455 172)">C ABI shim</text>

  <rect x="596" y="90" width="290" height="150" rx="10" fill="#0E1A2E" stroke="#38BDF8"/>
  <text x="614" y="118" font-size="13" fill="#64748B">NATIVE (build hooks)</text>
  <text x="614" y="150" font-size="15" fill="#E2E8F0">official BLAKE3, vendored</text>
  <text x="614" y="176" font-size="13" fill="#94A3B8">arm64 NEON kernel, SSE/AVX on x86,</text>
  <text x="614" y="196" font-size="13" fill="#94A3B8">portable fallback everywhere else</text>
  <text x="614" y="222" font-size="12.5" fill="#64748B">tree hash, parallel-friendly</text>

  <rect x="952" y="90" width="164" height="150" rx="10" fill="#111C2E" stroke="#1E3A5F"/>
  <text x="970" y="118" font-size="13" fill="#64748B">OUTPUT</text>
  <text x="970" y="152" font-size="15" fill="#E2E8F0">32-byte digest</text>
  <text x="970" y="178" font-size="13" fill="#94A3B8">or any length</text>
  <text x="970" y="198" font-size="13" fill="#94A3B8">you ask for</text>

  <path d="M314 165 L380 165" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M530 165 L596 165" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M886 165 L952 165" stroke="#38BDF8" stroke-width="2" marker-end="url(#a)"/>
  <text x="44" y="300" font-size="13" fill="#64748B">The native kernel is the same code the reference implementation ships, so you get its throughput from Dart.</text>
</svg>
