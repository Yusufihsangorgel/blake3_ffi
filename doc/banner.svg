<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">blake3_ffi</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Fast BLAKE3 hashing for Dart over native FFI</text>

  <!-- motif: BLAKE3 binary Merkle tree, root accented, converging to a digest -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <!-- edges (drawn first, behind nodes) -->
    <path d="M 962 128 L 900 186 M 962 128 L 1024 186" stroke="#1E3A5F"/>
    <path d="M 900 186 L 868 244 M 900 186 L 932 244" stroke="#1E3A5F"/>
    <path d="M 1024 186 L 992 244 M 1024 186 L 1056 244" stroke="#1E3A5F"/>
    <!-- leaf chunks (bottom row) -->
    <rect x="854" y="244" width="28" height="20" rx="3" stroke="#1E3A5F"/>
    <rect x="918" y="244" width="28" height="20" rx="3" stroke="#1E3A5F"/>
    <rect x="978" y="244" width="28" height="20" rx="3" stroke="#1E3A5F"/>
    <rect x="1042" y="244" width="28" height="20" rx="3" stroke="#1E3A5F"/>
    <!-- interior nodes -->
    <circle cx="900" cy="186" r="9" stroke="#38BDF8"/>
    <circle cx="1024" cy="186" r="9" stroke="#38BDF8"/>
    <!-- root node, filled accent -->
    <circle cx="962" cy="118" r="11" fill="#38BDF8"/>
    <!-- digest output from root -->
    <path d="M 984 118 L 1040 118" stroke="#38BDF8"/>
    <path d="M 1030 110 L 1042 118 L 1030 126" stroke="#38BDF8"/>
  </g>
</svg>
